<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            opacity: 0.9;
        }

        #greska{
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Unesite šifru</h2>

        <input type="password" id="sifra" placeholder="Šifra">

        <button onclick="proveriSifru()">Potvrdi</button>

        <p id="greska"></p>
    </div>

    <script>
        function proveriSifru() {

            const tacnaSifra = "VukVeseli";
            const unetaSifra = document.getElementById("sifra").value;

            if(unetaSifra === tacnaSifra){
                window.location.href = "slicice.html";
            } else {
                document.getElementById("greska").innerText = "Pogrešna šifra!";
                document.getElementById("sifra").value = "";
            }
        }
    </script>

</body>
</html>
