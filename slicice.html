<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sličice</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

h2{
    margin-top:30px;
}

.grid{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-start;
}


.item{
    width:50px;
    height:50px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.item.owned{
    background:#4caf50; /* ZELENO */
    color:white;
}

.item.missing{
    background:white; /* CRVENO */
    color:black;
}

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:200px;
}

.btn{
    display:block;
    margin:10px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.ok{background:#4caf50;color:white;}
.no{background:#f44336;color:white;}
.close{background:#777;color:white;}
</style>

</head>

<body>

<h1>Moje sličice</h1>

<div id="app"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>

        <button class="btn ok" onclick="setStatus(true)">✔ Imam</button>
        <button class="btn no" onclick="setStatus(false)">✖ Nemam</button>
        <button class="btn close" onclick="closeModal()">Zatvori</button>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
